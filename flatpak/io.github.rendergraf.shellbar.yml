app-id: io.github.rendergraf.shellbar
runtime: org.gnome.Platform
runtime-version: "48"
sdk: org.gnome.Sdk
command: shellbar
finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --share=network
  - --filesystem=host
  - --socket=session-bus
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.gtk.vfs
  - --talk-name=org.gtk.vfs.*
  - --system-talk-name=org.freedesktop.login1
  - --env=TERM=xterm-256color
cleanup:
  - /include
  - /lib/pkgconfig
  - /share/doc
  - /share/man
modules:
  - name: zig
    buildsystem: simple
    build-commands:
      - install -Dm755 zig /app/bin/zig
    sources:
      - type: archive
        url: https://ziglang.org/download/0.15.1/zig-linux-x86_64-0.15.1.tar.xz
        sha256: a0a35ef1f161f8a65f61b9c6bcd0807c19a3d1a27caa7e55c282170f560215a9
        strip-components: 0

  - name: libghostty-vt
    buildsystem: simple
    build-commands:
      - zig build -Doptimize=ReleaseFast --prefix /app
    sources:
      - type: git
        url: https://github.com/ghostty-org/ghostty.git
        tag: v1.2.0

  - name: shellbar
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    sources:
      - type: git
        url: https://github.com/rendergraf/shellbar.git
        tag: v1.9.0
      - type: file
        path: io.github.rendergraf.shellbar.desktop
      - type: file
        path: io.github.rendergraf.shellbar.metainfo.xml
    post-install:
      - install -Dm644 io.github.rendergraf.shellbar.desktop /app/share/applications/io.github.rendergraf.shellbar.desktop
      - install -Dm644 io.github.rendergraf.shellbar.metainfo.xml /app/share/metainfo/io.github.rendergraf.shellbar.metainfo.xml
      - install -Dm644 ../LICENSE /app/share/licenses/io.github.rendergraf.shellbar/LICENSE
